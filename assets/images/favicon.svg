<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8A44A"/>
      <stop offset="100%" style="stop-color:#1E6F80"/>
    </linearGradient>
    <clipPath id="circle">
      <circle cx="16" cy="16" r="15"/>
    </clipPath>
  </defs>

  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="url(#bg)"/>

  <!-- Scene elements clipped to circle -->
  <g clip-path="url(#circle)">
    <!-- Mountains -->
    <polygon points="1,28 8,14 13,22 19,16 27,28" fill="#1E4A5E" opacity="0.8"/>
    <!-- Water -->
    <rect x="1" y="23" width="30" height="9" fill="#3A9BB5" opacity="0.7"/>
    <!-- Tree trunk -->
    <rect x="7" y="18" width="2" height="8" fill="#4A2E0A"/>
    <!-- Tree -->
    <ellipse cx="8" cy="16" rx="5" ry="4" fill="#2D6A4F"/>
    <!-- Sun -->
    <circle cx="22" cy="11" r="4" fill="#F7C56A" opacity="0.9"/>
  </g>

  <!-- Puzzle piece - top right -->
  <path d="M22 4 h5 v2 a2 2 0 0 1 0 4 v2 h-5 v-2 a2 2 0 0 0 0-4 z" fill="white" opacity="0.95"/>

  <!-- Circle border -->
  <circle cx="16" cy="16" r="15" fill="none" stroke="white" stroke-width="0.5" opacity="0.3"/>
</svg>
