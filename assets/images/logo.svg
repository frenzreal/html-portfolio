<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 280" width="480" height="280">
  <defs>
    <linearGradient id="circleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8A44A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E6F80;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="waterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4DAAB8;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#2A7A8C;stop-opacity:0.7" />
    </linearGradient>
    <linearGradient id="scriptGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2A7A8C;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#2A7A8C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8A44A;stop-opacity:1" />
    </linearGradient>
    <clipPath id="circleClip">
      <circle cx="140" cy="110" r="95"/>
    </clipPath>
  </defs>

  <!-- ── ICON MARK ── -->
  <!-- Outer circle -->
  <circle cx="140" cy="110" r="95" fill="url(#circleGrad)" opacity="0.15"/>
  <circle cx="140" cy="110" r="95" fill="none" stroke="url(#circleGrad)" stroke-width="2.5" opacity="0.6"/>

  <!-- Sky gradient fill -->
  <circle cx="140" cy="110" r="92" fill="url(#circleGrad)" opacity="0.08"/>

  <!-- Mountains -->
  <g clip-path="url(#circleClip)">
    <rect x="48" y="80" width="185" height="90" fill="#3A8FA8" opacity="0.12"/>
    <polygon points="48,175 95,95 130,140 170,105 215,175" fill="#2A5E72" opacity="0.65"/>
    <polygon points="155,175 190,115 230,175" fill="#1E4A5E" opacity="0.55"/>
    <!-- Water -->
    <rect x="48" y="168" width="185" height="40" rx="3" fill="url(#waterGrad)" opacity="0.7"/>
    <!-- Shimmer lines -->
    <line x1="80" y1="180" x2="180" y2="180" stroke="white" stroke-width="1.5" opacity="0.25"/>
    <line x1="95" y1="188" x2="175" y2="188" stroke="white" stroke-width="1" opacity="0.15"/>
    <!-- Sun -->
    <circle cx="185" cy="108" r="18" fill="#F7C56A" opacity="0.85"/>
    <circle cx="185" cy="108" r="13" fill="#FCDFA0" opacity="0.9"/>
    <!-- Tree trunk -->
    <rect x="97" y="130" width="7" height="40" fill="#4A2E0A" opacity="0.9"/>
    <!-- Tree canopy -->
    <ellipse cx="100" cy="122" rx="22" ry="18" fill="#2D5A40" opacity="0.85"/>
    <ellipse cx="100" cy="115" rx="16" ry="13" fill="#3D6A50" opacity="0.8"/>
  </g>

  <!-- Puzzle piece cutout (white) -->
  <path d="M178 78 h18 v7 a7 7 0 0 1 0 14 v7 h-18 v-7 a7 7 0 0 0 0-14 z" fill="white" opacity="0.95"/>

  <!-- Circle stroke overlay -->
  <circle cx="140" cy="110" r="95" fill="none" stroke="url(#circleGrad)" stroke-width="2" opacity="0.4"/>

  <!-- ── WORDMARK ── -->
  <!-- "A PIECE OF MY" — spaced caps serif style represented in SVG text -->
  <text x="240" y="155" 
        font-family="'Cormorant Garamond', Georgia, 'Times New Roman', serif" 
        font-size="16" 
        font-weight="400"
        letter-spacing="5"
        text-anchor="middle"
        fill="#3D2210"
        opacity="0.85">— A PIECE OF MY —</text>

  <!-- "Sanity" script -->
  <text x="240" y="215" 
        font-family="'Dancing Script', 'Brush Script MT', cursive" 
        font-size="72" 
        font-weight="700"
        text-anchor="middle"
        fill="url(#scriptGrad)">Sanity</text>

  <!-- Underline flourish -->
  <path d="M155 228 Q240 236 325 228" stroke="url(#scriptGrad)" stroke-width="2" fill="none" opacity="0.4"/>
</svg>
